<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- box body -->
  <rect x="1" y="14" width="30" height="17" rx="2" fill="#1a3a1a"/>
  <!-- lid -->
  <rect x="0" y="8" width="32" height="8" rx="2" fill="#2d5a2d"/>
  <!-- ribbon vertical -->
  <rect x="13" y="8" width="6" height="23" fill="#c8963a"/>
  <!-- ribbon horizontal on lid -->
  <rect x="0" y="11" width="32" height="3" fill="#c8963a"/>
  <!-- bow left loop -->
  <ellipse cx="11" cy="7" rx="7" ry="5" fill="#c8963a" transform="rotate(-25 11 7)"/>
  <!-- bow right loop -->
  <ellipse cx="21" cy="7" rx="7" ry="5" fill="#c8963a" transform="rotate(25 21 7)"/>
  <!-- bow center knot -->
  <circle cx="16" cy="7" r="3.5" fill="#d4aa50"/>
</svg>
